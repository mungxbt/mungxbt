name: KSEI Monthly Scraper

on:
  schedule:
    - cron: "0 19 6 * *"   # Tiap tanggal 6, jam 02:00 WIB
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run scraper
        run: python scraper.py

      - name: Check output
        run: |
          if [ ! -f data/ksei.json ]; then
            echo "ERROR: data/ksei.json tidak ditemukan!"
            exit 1
          fi
          SIZE=$(wc -c < data/ksei.json)
          echo "ksei.json size: $SIZE bytes"
          if [ "$SIZE" -lt 50000 ]; then
            echo "ERROR: File terlalu kecil ($SIZE bytes), scraping mungkin gagal"
            cat data/ksei.json
            exit 1
          fi
          echo "✓ File OK"

      - name: Commit & push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ksei.json
          git diff --staged --quiet || git commit -m "data: update KSEI $(date +'%Y-%m')"
          git push
