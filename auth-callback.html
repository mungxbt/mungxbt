<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login... – mungxbt.site</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0e0e0e; color: #f0ede8;
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
  }
  .spinner {
    width: 32px; height: 32px; border: 2px solid rgba(239,159,39,0.2);
    border-top-color: #EF9F27; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { font-size: 0.85rem; color: #9a9690; }
</style>
</head>
<body>
<div class="spinner"></div>
<p>Memproses login Google...</p>
<script>
  // Supabase redirect ke sini dengan hash #access_token=...
  // Kita forward hash ke halaman asal dan redirect
  const hash = window.location.hash;
  const redirect = localStorage.getItem('mungxbt_auth_redirect') || '/bitcoin.html';
  localStorage.removeItem('mungxbt_auth_redirect');

  if (hash.includes('access_token')) {
    // Redirect ke halaman tujuan sambil bawa hash token
    window.location.replace(redirect + hash);
  } else {
    // Gak ada token, balik ke home
    window.location.replace('/');
  }
</script>
</body>
</html>
